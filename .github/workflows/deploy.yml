name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Merge with existing gh-pages
        run: |
          # Fetch gh-pages content
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          mkdir -p /tmp/gh-pages-old
          git archive gh-pages 2>/dev/null | tar -x -C /tmp/gh-pages-old || true
          
          # Copy old gh-pages content as base
          mkdir -p /tmp/merged
          cp -r /tmp/gh-pages-old/* /tmp/merged/ 2>/dev/null || true
          
          # Overlay new build on top (new content wins)
          cp -r dist/* /tmp/merged/
          
          # Replace dist with merged result
          rm -rf dist
          mv /tmp/merged dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
